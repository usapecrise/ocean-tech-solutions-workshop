<script>
$(function() {

  $(window).scroll(function() {
    if ($(this).scrollTop() > 300) {
      $('#backToTop').addClass('show');
    } else {
      $('#backToTop').removeClass('show');
    }
  });

  $('#backToTop').on('click', function(event) {
    event.preventDefault();

    document.documentElement.style.scrollBehavior = 'auto';

    $('html, body').stop(true).animate({
      scrollTop: 0
    }, 300);

    setTimeout(function() {
      document.documentElement.style.scrollBehavior = 'smooth';
    }, 200);
  });

});
</script>

<script>
$(window).scroll(function() {
  var trigger = $('#intro').height();

  if ($(this).scrollTop() > trigger + 60) {
    $('.navbar-default').addClass('navbar-shrink');
  } else {
    $('.navbar-default').removeClass('navbar-shrink');
  }
});
</script>

<script>
$(document).on('click', '.speaker-toggle', function(e) {
  e.stopPropagation();

  var $currentRow = $(this).closest('.speaker-row');

  // Close all others
  $('.speaker-row').not($currentRow).removeClass('active');
  $('.speaker-row').not($currentRow).find('.speaker-toggle').text('View full bio →');

  // Toggle current
  $currentRow.toggleClass('active');

  // Update button text
  if ($currentRow.hasClass('active')) {
    $(this).text('Hide bio ↑');
  } else {
    $(this).text('View full bio →');
  }
});
</script>

<script>
document.querySelectorAll('a.page-scroll').forEach(anchor => {
  anchor.addEventListener('click', function(e) {
    e.preventDefault();  //

    const target = document.querySelector(this.getAttribute('href'));
    if (!target) return;

    target.scrollIntoView({
      behavior: 'smooth'
    });
  });
});
</script>

<script>
const sections = document.querySelectorAll("section[id]");

window.addEventListener("scroll", () => {
  let current = "";

  sections.forEach(section => {
    const top = section.offsetTop - 120;

    if (window.scrollY >= top) {
      current = section.id;
    }
  });

  if (current) {
    history.replaceState(null, "", "#" + current);
  }
});
</script>
